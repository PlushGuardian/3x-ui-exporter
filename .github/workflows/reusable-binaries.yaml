name: Build multiarch binaries

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      commit_sha:
        required: true
        type: string
      binary_name:
        required: true
        type: string
      architectures:
        required: true
        type: string
      main_package_path:
        description: 'Path to the main package (e.g., ./cmd/x-ui-exporter)'
        required: true
        type: string

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: ${{ fromJson(inputs.architectures) }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.7'

      - name: Print build configuration
        run: |
          echo "::group::Build Configuration"
          echo "  Binary name:   ${{ inputs.binary_name }}"
          echo "  Package path:  ${{ inputs.main_package_path }}"
          echo "  Version:       ${{ inputs.version }}"
          echo "  Commit:        ${{ inputs.commit_sha }}"
          echo ""
          echo "  OS:            ${{ matrix.os }}"
          echo "  Architecture:  ${{ matrix.arch }}"
          echo "  GOARM:         ${{ matrix.goarm || 'not set' }}"
          echo "  LDFLAGS:       -w -s -X main.version=${{ inputs.version }} -X main.commit=${{ inputs.commit_sha }}"
          echo "::endgroup::"

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          GOARM: ${{ matrix.goarm || '' }}
        run: |
          go build \
            -ldflags="-w -s -X main.version=${{ inputs.version }} -X main.commit=${{ inputs.commit_sha }}" \
            -trimpath \
            -o ${{ inputs.binary_name }}${{ matrix.os == 'windows' && '.exe' || '' }}\
            ${{ inputs.main_package_path }}

      - name: Archive binary
        run: |
          if [ "${{ matrix.os }}" = "windows" ]; then
            zip ${{ inputs.binary_name }}-${{ inputs.version }}-${{ matrix.os }}-${{ matrix.arch }}.zip ${{ inputs.binary_name }}-${{ matrix.os }}-${{ matrix.arch }}.exe
          else
            tar -czf ${{ inputs.binary_name }}-${{ inputs.version }}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz ${{ inputs.binary_name }}-${{ matrix.os }}-${{ matrix.arch }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.binary_name }}-${{ inputs.version }}-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ inputs.binary_name }}-${{ inputs.version }}-${{ matrix.os }}-${{ matrix.arch }}.*
